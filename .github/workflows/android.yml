name: Android CI & Release

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > app/release.jks
          chmod 600 app/release.jks

      - name: Build Signed APK
        run: ./gradlew assembleRelease -Porg.gradle.java.installations.auto-detect=false -Porg.gradle.java.installations.auto-download=false
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL}}
          PIC_URL: ${{ secrets.PIC_URL}}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          RELEASE_STORE_FILE: release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK Signature
        run: |
          jarsigner -verify -verbose -certs app/build/outputs/apk/release/app-release.apk


      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GIT }}

      - name: Check Keystore Size
        run: ls -lh app/release.jks